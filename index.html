<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM 현황 관리 - Google Sheets Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
</head>
<body class="google-theme">
    <header class="google-header">
        <div class="top-bar">
            <div class="app-logo">📊</div>
            <div class="file-info">
                <span class="file-name">1) TM 현황 DB.xlsx</span>
            </div>
        </div>
        <div class="menu-bar">
            <span class="menu-item">파일</span>
            <span class="menu-item">수정</span>
            <span class="menu-item">보기</span>
            <span class="menu-item">삽입</span>
            <span class="menu-item">형식</span>
            <span class="menu-item">데이터</span>
            <span class="menu-item">도구</span>
            <span class="menu-item">확장 프로그램</span>
            <span class="menu-item">도움말</span>
        </div>
        <div class="formula-bar">
            <div class="cell-address" id="cell-address">A1</div>
            <div class="formula-input">
                <span class="fx-icon">fx</span>
                <input type="text" id="formula-input" readonly>
            </div>
        </div>
    </header>

    <main class="app-body">
        <div class="grid-container" id="grid-container">
            <!-- Dynamic Grid Table will be injected here -->
        </div>
    </main>

    <footer class="app-footer">
        <div class="sheet-tabs" id="sheet-tabs">
            <!-- Sheet tabs will be injected here -->
        </div>
        <div class="status-bar">
            <div class="status-left">준비 | 구글 스타일 모드</div>
            <div class="status-right">
                <span>100%</span>
                <input type="range" min="50" max="200" value="100">
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
