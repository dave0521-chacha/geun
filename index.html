<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 로또 추첨기</title>
    <style>
        /* 기본(라이트 모드) 스타일 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            color: #202124;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 다크 모드 스타일 */
        body.dark-mode {
            background-color: #202124;
            color: #bdc1c6;
        }

        /* 오른쪽 위 테마 전환 버튼 */
        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            cursor: pointer;
            background-color: transparent;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            color: inherit;
            transition: background-color 0.2s;
        }

        body.dark-mode #theme-toggle {
            border-color: #5f6368;
        }

        #theme-toggle:hover {
            background-color: rgba(150, 150, 150, 0.1);
        }

        /* 구글 스타일 로고 */
        .logo {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        
        .c1 { color: #4285F4; } /* Blue */
        .c2 { color: #EA4335; } /* Red */
        .c3 { color: #FBBC05; } /* Yellow */
        .c4 { color: #4285F4; } /* Blue */
        .c5 { color: #34A853; } /* Green */

        /* 🌟 눈에 띄게 변경된 추첨 버튼 */
        #generate-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4285F4; /* 구글 파란색 */
            border: none;
            border-radius: 30px; /* 둥근 캡슐 모양 */
            color: white;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(66, 133, 244, 0.3);
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
        }

        #generate-btn:hover {
            background-color: #3367D6;
            box-shadow: 0 6px 10px rgba(66, 133, 244, 0.4);
        }

        #generate-btn:active {
            transform: scale(0.96); /* 클릭 시 살짝 작아지는 효과 */
        }

        /* 추첨 중일 때 버튼 비활성화 스타일 */
        #generate-btn:disabled {
            background-color: #a0c1f9;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        body.dark-mode #generate-btn {
            background-color: #8ab4f8;
            color: #202124;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        body.dark-mode #generate-btn:hover {
            background-color: #aecbfa;
        }

        body.dark-mode #generate-btn:disabled {
            background-color: #5f6368;
            color: #9aa0a6;
        }

        /* 로또 번호 결과 출력 영역 */
        #result-container {
            text-align: center;
            font-size: 1.2rem;
            line-height: 2;
            min-height: 250px; /* 영역 높이 고정 */
        }

        /* 🌟 순차적으로 나타나는 애니메이션 설정 */
        .lotto-row {
            margin: 12px 0;
            letter-spacing: 2px;
            opacity: 0; /* 처음엔 투명하게 */
            transform: translateY(15px); /* 살짝 아래에 위치 */
            animation: fadeInUp 0.5s ease-out forwards; /* 나타나는 애니메이션 */
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lotto-number {
            display: inline-block;
            width: 38px;
            height: 38px;
            line-height: 38px;
            border-radius: 50%;
            background-color: #e8eaed;
            color: #202124;
            margin: 0 5px;
            font-weight: bold;
            text-align: center;
        }

        body.dark-mode .lotto-number {
            background-color: #5f6368;
            color: #ffffff;
        }

        /* 🌟 오른쪽 아래 문구 추가 */
        #footer-text {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 4rem; /* 로고와 같은 크기 */
            font-weight: bold;
            color: #5f6368;
            opacity: 0.3; /* 너무 방해되지 않게 투명도 조절 */
            pointer-events: none;
        }

        body.dark-mode #footer-text {
            color: #9aa0a6;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">다크 모드</button>

    <div class="logo">
        <span class="c1">L</span><span class="c2">o</span><span class="c3">t</span><span class="c4">t</span><span class="c5">o</span>
    </div>

    <!-- 🌟 수정된 추첨 버튼 -->
    <button id="generate-btn">번호 5개(게임) 뽑기</button>

    <div id="result-container"></div>

    <script>
        // 다크모드/화이트모드 전환
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                themeToggleBtn.textContent = '라이트 모드';
            } else {
                themeToggleBtn.textContent = '다크 모드';
            }
        });

        // 1~45 사이 번호 6개 추출
        function getLottoNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            return numbers.sort((a, b) => a - b);
        }

        const generateBtn = document.getElementById('generate-btn');
        const resultContainer = document.getElementById('result-container');

        generateBtn.addEventListener('click', () => {
            // 🌟 1. 추첨 중 버튼 비활성화 (중복 클릭 방지)
            generateBtn.disabled = true;
            generateBtn.textContent = '번호 추첨 중...';
            
            // 기존 결과 지우기
            resultContainer.innerHTML = '';

            // 🌟 2. 5줄을 순차적으로 띄우기 위한 반복문과 setTimeout
            for (let i = 0; i < 5; i++) {
                // i * 600 밀리초(0.6초) 간격으로 실행
                setTimeout(() => {
                    const numbers = getLottoNumbers();
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'lotto-row';
                    
                    let rowHTML = '';
                    numbers.forEach(num => {
                        rowHTML += `<span class="lotto-number">${num}</span>`;
                    });
                    
                    rowDiv.innerHTML = rowHTML;
                    resultContainer.appendChild(rowDiv);

                    // 🌟 3. 마지막 줄이 출력되면 버튼 다시 활성화
                    if (i === 4) {
                        setTimeout(() => {
                            generateBtn.disabled = false;
                            generateBtn.textContent = '번호 5개(게임) 뽑기';
                        }, 600); // 마지막 줄 애니메이션이 끝날 여유 시간 추가
                    }
                }, i * 600); 
            }
        });
    </script>
</body>
</html>
