<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM 현황 관리 - Excel Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
</head>
<body class="excel-theme">
    <header class="excel-header">
        <div class="top-bar">
            <span class="excel-logo">Excel</span>
            <span class="file-name">1) TM 현황 DB.xlsx</span>
            <div class="user-profile">차차바보</div>
        </div>
        <div class="ribbon">
            <nav class="ribbon-tabs">
                <button class="active">파일</button>
                <button>홈</button>
                <button>삽입</button>
                <button>데이터</button>
                <button>검토</button>
                <button>보기</button>
            </nav>
            <div class="ribbon-content">
                <div class="tool-group">
                    <button id="btn-filter"><span class="icon">🔍</span>필터</button>
                    <button id="btn-sort"><span class="icon">↕️</span>정렬</button>
                </div>
                <div class="tool-group">
                    <button id="btn-add-row"><span class="icon">➕</span>행 추가</button>
                </div>
            </div>
        </div>
        <div class="formula-bar">
            <div class="cell-address" id="cell-address">A1</div>
            <div class="formula-input">
                <span class="fx-icon">fx</span>
                <input type="text" id="formula-input" readonly>
            </div>
        </div>
    </header>

    <main class="excel-body">
        <div class="grid-container" id="grid-container">
            <!-- Dynamic Grid Table will be injected here -->
        </div>
    </main>

    <footer class="excel-footer">
        <div class="sheet-tabs" id="sheet-tabs">
            <!-- Sheet tabs will be injected here -->
        </div>
        <div class="status-bar">
            <div class="status-left">준비 | 차차바보 모드</div>
            <div class="status-right">
                <span>100%</span>
                <input type="range" min="50" max="200" value="100">
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
